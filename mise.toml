[tools]
rust = "stable"
"go:github.com/charmbracelet/vhs" = "0.11.0"

[tasks."setup"]
description = "Fetch Rust dependencies"
run = "cargo fetch"

[tasks."build"]
description = "Build the Rust workspace"
depends = ["setup"]
run = "cargo build --workspace"

[tasks."build:plugin"]
description = "Build the Zellij WASM plugin"
run = "cargo build -p dellij-status --release --target wasm32-wasip1"

[tasks."dev"]
description = "Run the Rust CLI from source"
run = "cargo run -p dellij -- list"

[tasks."record"]
description = "Record all VHS demo GIFs"
run = "vhs vhs/demo.tape && vhs vhs/hooks.tape && vhs vhs/merge.tape"

[tasks."release"]
description = "Build and check the Rust workspace before release"
run = "cargo check --workspace && cargo build --workspace --release"
